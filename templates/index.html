<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Cutter Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a28;
            --bg-input: #0f0f18;
            --border-color: #2a2a3d;
            --border-focus: #6c5ce7;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent: #6c5ce7;
            --accent-hover: #7f71ea;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00d2a0;
            --success-glow: rgba(0, 210, 160, 0.2);
            --danger: #ff6b6b;
            --danger-glow: rgba(255, 107, 107, 0.2);
            --warning: #ffd93d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 210, 160, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(108, 92, 231, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .header .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: rgba(108, 92, 231, 0.3);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title span.dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* URL Input */
        .url-input-group {
            display: flex;
            gap: 12px;
        }

        .url-input-group input {
            flex: 1;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 16px 20px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        .url-input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .url-input-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 16px 28px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b7cf0);
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #00e6b0);
            color: #0a0a0f;
            box-shadow: 0 4px 20px var(--success-glow);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--success-glow);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 800px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Video Preview */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: var(--bg-input);
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

        .video-container iframe,
        .video-container .placeholder {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 12px;
        }

        .placeholder svg {
            width: 48px;
            height: 48px;
            opacity: 0.3;
        }

        .video-info-bar {
            margin-top: 16px;
            padding: 14px 18px;
            background: var(--bg-input);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .video-info-bar .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-info-bar .meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Time Inputs */
        .time-section {
            margin-bottom: 24px;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .time-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 70px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-inputs {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }

        .time-inputs input {
            width: 58px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 8px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', monospace;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        .time-inputs input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .time-inputs input.active-target {
            border-color: var(--success);
            box-shadow: 0 0 0 3px var(--success-glow);
        }

        .time-sep {
            color: var(--text-muted);
            font-size: 20px;
            font-weight: 700;
        }

        .time-unit {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .btn-set-time {
            padding: 10px 14px;
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 10px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .btn-set-time:hover {
            background: rgba(108, 92, 231, 0.25);
        }

        .btn-set-time.active {
            background: var(--accent);
            color: white;
        }

        /* Active field selector */
        .field-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .field-selector button {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }

        .field-selector button.active {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.1);
            color: var(--accent);
        }

        /* Duration badge */
        .duration-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(0, 210, 160, 0.1);
            border: 1px solid rgba(0, 210, 160, 0.2);
            border-radius: 30px;
            color: var(--success);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Download section */
        .download-section {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .download-section .btn {
            flex: 1;
            justify-content: center;
            padding: 18px;
            font-size: 15px;
        }

        /* Status / Toast */
        .status-bar {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .status-bar.info {
            display: flex;
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.2);
            color: var(--accent);
        }

        .status-bar.success {
            display: flex;
            background: rgba(0, 210, 160, 0.1);
            border: 1px solid rgba(0, 210, 160, 0.2);
            color: var(--success);
        }

        .status-bar.error {
            display: flex;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: var(--danger);
        }

        /* Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: var(--bg-input);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 4px;
            width: 0%;
            animation: indeterminate 1.5s ease-in-out infinite;
        }

        @keyframes indeterminate {
            0% { width: 0%; margin-left: 0; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 0%; margin-left: 100%; }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">✂️</div>
                <h1>YT Cutter Pro</h1>
            </div>
            <p>Paste a YouTube link, set start & end time, cut & download.</p>
        </div>

        <!-- URL Input Card -->
        <div class="card">
            <div class="card-title"><span class="dot"></span> Video URL</div>
            <div class="url-input-group">
                <input type="text" id="urlInput" placeholder="Paste YouTube URL here... (e.g. https://youtube.com/watch?v=...)" />
                <button class="btn btn-primary" id="loadBtn" onclick="loadVideo()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    Load
                </button>
            </div>
            <div class="status-bar" id="loadStatus"></div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left: Video Preview -->
            <div class="card">
                <div class="card-title"><span class="dot"></span> Preview</div>
                <div class="video-container" id="videoContainer">
                    <div class="placeholder" id="videoPlaceholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 16 21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        <span>Load a video to preview</span>
                    </div>
                </div>
                <div class="video-info-bar hidden" id="videoInfoBar">
                    <div class="title" id="videoTitle">—</div>
                    <div class="meta" id="videoMeta">—</div>
                </div>
            </div>

            <!-- Right: Controls -->
            <div class="card">
                <div class="card-title"><span class="dot"></span> Cut Settings</div>

                <!-- Active field selector for "Set Current Time" -->
                <label style="font-size:12px; color:var(--text-muted); margin-bottom:6px; display:block;">Click a selector, then use "Set from player" button or type manually:</label>
                <div class="field-selector">
                    <button id="selStart" class="active" onclick="setActiveField('start')">🎯 Target: START</button>
                    <button id="selEnd" onclick="setActiveField('end')">🎯 Target: END</button>
                </div>

                <!-- Start Time -->
                <div class="time-section">
                    <div class="time-row">
                        <div class="time-label">Start</div>
                        <div class="time-inputs">
                            <input type="number" id="startH" min="0" max="23" value="0" placeholder="H" oninput="updateDuration()" onfocus="setActiveField('start')">
                            <span class="time-sep">:</span>
                            <input type="number" id="startM" min="0" max="59" value="0" placeholder="M" oninput="updateDuration()" onfocus="setActiveField('start')">
                            <span class="time-sep">:</span>
                            <input type="number" id="startS" min="0" max="59" value="0" placeholder="S" oninput="updateDuration()" onfocus="setActiveField('start')">
                        </div>
                        <button class="btn-set-time" onclick="setTimeFromPlayer()" title="Set current player time to selected field">⏱ Set</button>
                    </div>

                    <!-- End Time -->
                    <div class="time-row">
                        <div class="time-label">End</div>
                        <div class="time-inputs">
                            <input type="number" id="endH" min="0" max="23" value="0" placeholder="H" oninput="updateDuration()" onfocus="setActiveField('end')">
                            <span class="time-sep">:</span>
                            <input type="number" id="endM" min="0" max="59" value="0" placeholder="M" oninput="updateDuration()" onfocus="setActiveField('end')">
                            <span class="time-sep">:</span>
                            <input type="number" id="endS" min="0" max="59" value="0" placeholder="S" oninput="updateDuration()" onfocus="setActiveField('end')">
                        </div>
                    </div>
                </div>

                <div class="duration-badge" id="durationBadge">
                    ⏱ Cut Duration: <strong id="durationText">0s</strong>
                </div>

                <!-- Download Button -->
                <div class="download-section">
                    <button class="btn btn-success" id="cutBtn" onclick="cutAndDownload()" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Cut & Download
                    </button>
                </div>

                <div class="status-bar" id="cutStatus"></div>
                <div class="progress-container" id="progressBar">
                    <div class="progress-bar"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            YT Cutter Pro — PoC / Testing Only
        </div>
    </div>

    <script>
        let videoLoaded = false;
        let videoDuration = 0;
        let activeField = 'start'; // 'start' or 'end'
        let playerCurrentTime = 0;
        let ytPlayer = null;

        // YouTube IFrame API
        let ytAPIReady = false;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = function() {
            ytAPIReady = true;
        };

        function setActiveField(field) {
            activeField = field;
            document.getElementById('selStart').classList.toggle('active', field === 'start');
            document.getElementById('selEnd').classList.toggle('active', field === 'end');

            // visual highlight
            ['startH','startM','startS'].forEach(id => {
                document.getElementById(id).classList.toggle('active-target', field === 'start');
            });
            ['endH','endM','endS'].forEach(id => {
                document.getElementById(id).classList.toggle('active-target', field === 'end');
            });
        }

        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.className = 'status-bar ' + type;
            el.innerHTML = (type === 'info' ? '<div class="spinner"></div>' : '') + message;
        }

        function hideStatus(elementId) {
            document.getElementById(elementId).className = 'status-bar';
            document.getElementById(elementId).style.display = 'none';
        }

        function extractVideoId(url) {
            const match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
            return match ? match[1] : null;
        }

        async function loadVideo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showStatus('loadStatus', '⚠️ Please paste a YouTube URL', 'error');
                return;
            }

            showStatus('loadStatus', 'Loading video info...', 'info');
            document.getElementById('loadBtn').disabled = true;

            try {
                const resp = await fetch('/api/video-info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const data = await resp.json();

                if (data.error) {
                    showStatus('loadStatus', '❌ ' + data.error, 'error');
                    document.getElementById('loadBtn').disabled = false;
                    return;
                }

                // Set video info
                videoDuration = data.duration;
                document.getElementById('videoTitle').textContent = data.title;
                const mins = Math.floor(data.duration / 60);
                const secs = data.duration % 60;
                document.getElementById('videoMeta').textContent = `Duration: ${mins}m ${secs}s`;
                document.getElementById('videoInfoBar').classList.remove('hidden');

                // Set end time to video duration
                document.getElementById('endH').value = Math.floor(data.duration / 3600);
                document.getElementById('endM').value = Math.floor((data.duration % 3600) / 60);
                document.getElementById('endS').value = data.duration % 60;
                updateDuration();

                // Load YouTube embed with API
                const container = document.getElementById('videoContainer');
                const placeholder = document.getElementById('videoPlaceholder');
                if (placeholder) placeholder.remove();

                // Remove old iframe if any
                const oldIframe = container.querySelector('iframe');
                if (oldIframe) oldIframe.remove();
                const oldDiv = document.getElementById('ytPlayerDiv');
                if (oldDiv) oldDiv.remove();

                const playerDiv = document.createElement('div');
                playerDiv.id = 'ytPlayerDiv';
                playerDiv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
                container.appendChild(playerDiv);

                if (ytAPIReady) {
                    ytPlayer = new YT.Player('ytPlayerDiv', {
                        videoId: data.video_id,
                        playerVars: {
                            autoplay: 0,
                            modestbranding: 1,
                            rel: 0,
                        }
                    });
                } else {
                    // fallback simple iframe
                    playerDiv.innerHTML = `<iframe src="${data.embed_url}?enablejsapi=1" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay"></iframe>`;
                }

                videoLoaded = true;
                document.getElementById('cutBtn').disabled = false;
                showStatus('loadStatus', '✅ Video loaded successfully!', 'success');

            } catch (e) {
                showStatus('loadStatus', '❌ Network error: ' + e.message, 'error');
            }

            document.getElementById('loadBtn').disabled = false;
        }

        function setTimeFromPlayer() {
            if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') {
                alert('Player not ready. Play the video first, then click Set.');
                return;
            }

            const currentTime = Math.floor(ytPlayer.getCurrentTime());
            const h = Math.floor(currentTime / 3600);
            const m = Math.floor((currentTime % 3600) / 60);
            const s = currentTime % 60;

            if (activeField === 'start') {
                document.getElementById('startH').value = h;
                document.getElementById('startM').value = m;
                document.getElementById('startS').value = s;
            } else {
                document.getElementById('endH').value = h;
                document.getElementById('endM').value = m;
                document.getElementById('endS').value = s;
            }
            updateDuration();
        }

        function getTimeInSeconds(prefix) {
            const h = parseInt(document.getElementById(prefix + 'H').value) || 0;
            const m = parseInt(document.getElementById(prefix + 'M').value) || 0;
            const s = parseInt(document.getElementById(prefix + 'S').value) || 0;
            return h * 3600 + m * 60 + s;
        }

        function updateDuration() {
            const start = getTimeInSeconds('start');
            const end = getTimeInSeconds('end');
            const diff = end - start;

            const badge = document.getElementById('durationText');
            if (diff <= 0) {
                badge.textContent = 'Invalid';
                badge.parentElement.style.borderColor = 'rgba(255,107,107,0.3)';
                badge.parentElement.style.background = 'rgba(255,107,107,0.1)';
                badge.parentElement.style.color = 'var(--danger)';
            } else {
                const dm = Math.floor(diff / 60);
                const ds = diff % 60;
                badge.textContent = dm > 0 ? `${dm}m ${ds}s` : `${ds}s`;
                badge.parentElement.style.borderColor = 'rgba(0,210,160,0.2)';
                badge.parentElement.style.background = 'rgba(0,210,160,0.1)';
                badge.parentElement.style.color = 'var(--success)';
            }
        }

        async function cutAndDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showStatus('cutStatus', '⚠️ No URL provided', 'error');
                return;
            }

            const start = getTimeInSeconds('start');
            const end = getTimeInSeconds('end');

            if (end <= start) {
                showStatus('cutStatus', '⚠️ End time must be after start time', 'error');
                return;
            }

            if ((end - start) <= 0) {
                showStatus('cutStatus', '⚠️ Duration cannot be zero', 'error');
                return;
            }

            document.getElementById('cutBtn').disabled = true;
            showStatus('cutStatus', 'Processing... Downloading & cutting the video. This may take a moment.', 'info');
            document.getElementById('progressBar').style.display = 'block';

            try {
                const resp = await fetch('/api/cut-download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        url,
                        start_h: document.getElementById('startH').value || 0,
                        start_m: document.getElementById('startM').value || 0,
                        start_s: document.getElementById('startS').value || 0,
                        end_h: document.getElementById('endH').value || 0,
                        end_m: document.getElementById('endM').value || 0,
                        end_s: document.getElementById('endS').value || 0,
                    })
                });

                const data = await resp.json();

                if (data.error) {
                    showStatus('cutStatus', '❌ ' + data.error, 'error');
                } else if (data.success) {
                    showStatus('cutStatus', '✅ Ready! Download starting...', 'success');
                    // Trigger download
                    const a = document.createElement('a');
                    a.href = `/api/download/${data.file_id}/${encodeURIComponent(data.filename)}`;
                    a.download = data.filename;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                }
            } catch (e) {
                showStatus('cutStatus', '❌ Error: ' + e.message, 'error');
            }

            document.getElementById('cutBtn').disabled = false;
            document.getElementById('progressBar').style.display = 'none';
        }

        // Init
        setActiveField('start');

        // Enter key on URL input
        document.getElementById('urlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadVideo();
        });
    </script>
</body>
</html>
